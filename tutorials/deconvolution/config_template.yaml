#     keep_last_n: 3   # Keep only last N checkpoints
#   
#   # Early stopping
#   early_stopping:
#     enabled: false
#     patience: 100       # Stop if no improvement for N epochs
#     min_delta: 1e-4     # Minimum change to count as improvement
#   
#   # Validation split (for hyperparameter tuning)
#   validation:
#     enabled: false
#     split_ratio: 0.2    # 20% of spots for validation
#     metric: "cosine"    # Metric to optimize


# ==============================================================================
# NOTES AND RECOMMENDATIONS
# ==============================================================================
#
# Quick Start:
# 1. Update paths in "DATA PATHS" section
# 2. Start with default parameters
# 3. Run deconvolution and check loss curves
# 4. Adjust parameters if needed (see troubleshooting in README)
#
# Parameter Tuning Guide:
# - If training unstable (NaN/Inf): Reduce lr to 0.001, change loss_type to "cosine"
# - If poor reconstruction: Increase epochs to 5000, lam_recon to 200, loss_type to "combined"
# - If too smooth: Reduce n_neighbors to 3, lam_contrast to 0.5
# - If too noisy: Increase n_neighbors to 10, lam_contrast to 2.0
#
# For More Help:
# - Documentation: https://coseniche.readthedocs.io/
# - Tutorials: ../README.md
# - Issues: https://github.com/yourusername/CoseNiche/issues
#
# ==============================================================================
